<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar conta — SimSMS Virtual</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand" style="margin-bottom:24px;"><span class="brand-mark"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg><span class="brand-dot"></span></span> SimSMS Virtual</div>
    <h1>Criar sua conta</h1>
    <p class="sub">Leva menos de um minuto. Sem cartão de crédito pra começar.</p>
    <div class="form-msg" id="msg"></div>
    <form id="form-cadastro">
      <div class="field">
        <label for="nome">Nome</label>
        <input type="text" id="nome" required autocomplete="name">
      </div>
      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required minlength="6" autocomplete="new-password">
      </div>
      <button class="btn btn-teal btn-block" type="submit">Criar conta</button>
    </form>
    <div class="auth-foot">Já tem conta? <a href="/login.html">Entrar</a></div>
  </div>
</div>
<script src="/js/auth.js"></script>
<script>(function(){document.querySelectorAll("input[type=password]").forEach(function(i){var w=document.createElement("div");w.style.position="relative";i.parentNode.insertBefore(w,i);w.appendChild(i);i.style.paddingRight="40px";i.style.boxSizing="border-box";var b=document.createElement("button");b.type="button";b.style.cssText="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;line-height:1;";b.textContent=String.fromCodePoint(128065);b.addEventListener("click",function(){if(i.type==="password"){i.type="text";b.textContent=String.fromCodePoint(128584)}else{i.type="password";b.textContent=String.fromCodePoint(128065)}});w.appendChild(b)})})();</script></body>
</html>
